services:
  sitl:
    build:
      context: .
      dockerfile: Dockerfile.sitl
    container_name: vcd_sitl
    ports:
      - "5760:5760"
      - "5770:5770"
      - "5780:5780"
    networks:
      - vcd_net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vcd_backend
    ports:
      - "8002:8002"
    environment:
      - SITL_HOST=sitl
      - WHISPER_MODEL=base
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER_BEAM_SIZE=1
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      - sitl
    networks:
      - vcd_net
    restart: unless-stopped

  frontend:
    build:
      context: ./showcase
      dockerfile: Dockerfile.frontend
    container_name: vcd_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8002
    depends_on:
      - backend
    networks:
      - vcd_net
    restart: unless-stopped

networks:
  vcd_net:
    driver: bridge
